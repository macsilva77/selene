name: Deploy Web → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'bun.lock'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev
  IMAGE_NAME: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/selene/web

jobs:
  build-and-deploy:
    name: Build, Push & Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image (Web)
        run: |
          docker build \
            --file Dockerfile.web \
            --tag ${{ steps.tag.outputs.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --cache-from ${{ env.IMAGE_NAME }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg NEXT_PUBLIC_API_URL=https://selene-api-5vpzlvjslq-rj.a.run.app \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: selene-web
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.tag.outputs.IMAGE_TAG }}
          flags: >-
            --allow-unauthenticated
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Show Web URL
        run: |
          URL=$(gcloud run services describe selene-web \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "## Web URL: $URL" >> $GITHUB_STEP_SUMMARY
