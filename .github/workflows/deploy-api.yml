name: Deploy API → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar deploy mesmo sem alterações no backend'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev
  IMAGE_NAME: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/selene/api

jobs:
  build-and-deploy:
    name: Build, Push & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Autenticação sem chave JSON — Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image (API)
        working-directory: backend
        run: |
          docker build \
            --file Dockerfile \
            --tag ${{ steps.tag.outputs.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --cache-from ${{ env.IMAGE_NAME }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: selene-api
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.tag.outputs.IMAGE_TAG }}
          secrets: |
            CERT_ENCRYPTION_KEY=selene-cert-encryption-key:latest

      - name: Show API URL
        run: |
          URL=$(gcloud run services describe selene-api \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "API URL: $URL"
          echo "API_URL=$URL" >> $GITHUB_STEP_SUMMARY
