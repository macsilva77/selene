name: Security

on:
  schedule:
    - cron: "0 6 * * 1"   # toda segunda-feira às 06:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Trivy: vulnerabilidades nas imagens Docker ───────────────────────────────
  trivy-backend:
    name: Trivy — Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (local)
        run: docker build -t selene-backend:scan ./backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: selene-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  trivy-web:
    name: Trivy — Web Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web image (local)
        run: docker build -t selene-web:scan -f Dockerfile.web .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: selene-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

  # ── Trivy: IaC e configs ────────────────────────────────────────────────────
  trivy-iac:
    name: Trivy — IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # informativo, não bloqueia

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ── npm audit (backend usa npm) ──────────────────────────────────────────────
  npm-audit:
    name: npm audit — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev

  # ── CodeQL: análise estática ─────────────────────────────────────────────────
  codeql:
    name: CodeQL — TypeScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          queries: security-and-quality

      - name: Build backend (para análise)
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-typescript
